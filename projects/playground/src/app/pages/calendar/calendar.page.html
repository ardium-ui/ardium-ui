<div class="flex horiz page-grid">
  <div class="master">
    <span class="title">Most basic calendar</span>
    <ard-calendar></ard-calendar>
  </div>
  <div class="master">
    <span class="title">Calendar color</span>
    <ard-calendar color="danger"></ard-calendar>
  </div>
  <div class="master">
    <span class="title">Calendar active date</span>
    <ard-calendar
      [activeYear]="1975"
      [activeMonth]="5"
    ></ard-calendar>
  </div>
  <div class="master">
    <span class="title">Calendar with preselected value</span>
    <ard-calendar [value]="selectedDate"></ard-calendar>
  </div>
  <div class="master">
    <span class="title">Read-only calendar</span>
    <ard-calendar readonly></ard-calendar>
  </div>
  <div class="master">
    <span class="title">Disabled calendar</span>
    <ard-calendar disabled></ard-calendar>
  </div>
  <div class="master">
    <span class="title">Static height calendar</span>
    <ard-calendar staticHeight></ard-calendar>
  </div>
  <div class="master">
    <span class="title">Calendar events</span>
    <ard-calendar
      [(ngModel)]="eventsCalendarDate"
      (valueChange)="log('valueChange', $event)"
      (ngModelChange)="log('ngModelChange', $event)"
      (activeViewChange)="log('activeViewChange', $event)"
      (activeMonthChange)="log('activeMonthChange', $event)"
      (activeYearChange)="log('activeYearChange', $event)"
    ></ard-calendar>
  </div>
  <div class="master">
    <span class="title">Calendar events (UTC)</span>
    <ard-calendar
      [(ngModel)]="eventsCalendarDateUTC"
      (valueChange)="log('valueChange', $event)"
      (ngModelChange)="log('ngModelChange', $event)"
      (activeViewChange)="log('activeViewChange', $event)"
      (activeMonthChange)="log('activeMonthChange', $event)"
      (activeYearChange)="log('activeYearChange', $event)"
      UTC
    ></ard-calendar>
  </div>
  <div class="master">
    <span class="title">Calendar with min/max dates</span>
    <ard-calendar
      [min]="minDate"
      [max]="maxDate"
    ></ard-calendar>
  </div>
  <div class="master">
    <span class="title">Calendar filter function</span>
    <ard-calendar [filter]="filterFn"></ard-calendar>
  </div>
  <div class="master"></div>
  <div class="master" style="grid-column: 1 / span 3">
    <span class="title">Multiple calendars strung together</span>
    <div class="flex horiz">
      <ard-calendar multiCalendarLocation="left"></ard-calendar>
      <ard-calendar multiCalendarLocation="inner"></ard-calendar>
      <ard-calendar multiCalendarLocation="right"></ard-calendar>
    </div>
  </div>
</div>
