<span class="title">Empty element</span>
<div class="grid master">
    <ard-select *ngFor="let disabled of [false, true]" [disabled]="disabled"></ard-select>
</div>
<span class="title">Primitive options, searchable</span>
<div class="grid master">
    <ard-select
        *ngFor="let disabled of [false, true]"
        [disabled]="disabled"
        [items]="fruits"
        searchable
        (focus)="log('focus', $event)"
        (blur)="log('blur', $event)"
        (add)="log('add', $event)"
        (remove)="log('remove', $event)"
        (valueChange)="log('valueChange', $event)"
        (clear)="log('clear', $event)"
        (open)="log('open', $event)"
        (close)="log('close', $event)"
        (scroll)="log('scroll', $event)"
        (scrollToEnd)="log('scrollToEnd', $event)"
        (search)="log('search', $event)"
    ></ard-select>
</div>
<span class="title">Object options, property binding, groups, searchable</span>
<div class="grid master">
    <ard-select
        *ngFor="let disabled of [false, true]"
        [disabled]="disabled"
        [items]="animals"
        valueFrom="name"
        labelFrom="name"
        groupLabelFrom="classification"
        (focus)="log('focus', $event)"
        (blur)="log('blur', $event)"
        (add)="log('add', $event)"
        (remove)="log('remove', $event)"
        (valueChange)="log('valueChange', $event)"
        (clear)="log('clear', $event)"
        (open)="log('open', $event)"
        (close)="log('close', $event)"
        (scroll)="log('scroll', $event)"
        (scrollToEnd)="log('scrollToEnd', $event)"
        (search)="log('search', $event)"
    ></ard-select>
</div>
<span class="title">Object options, property binding, groups, customized with templates</span>
<div class="grid master">
    <ard-select
        *ngFor="let disabled of [false, true]"
        [disabled]="disabled"
        [items]="animals"
        valueFrom="name"
        labelFrom="name"
        multiselectable
        [closeOnSelect]="false"
        groupLabelFrom="classification"
        (focus)="log('focus', $event)"
        (blur)="log('blur', $event)"
        (add)="log('add', $event)"
        (remove)="log('remove', $event)"
        (valueChange)="log('valueChange', $event)"
        (clear)="log('clear', $event)"
        (open)="log('open', $event)"
        (close)="log('close', $event)"
        (scroll)="log('scroll', $event)"
        (scrollToEnd)="log('scrollToEnd', $event)"
        (search)="log('search', $event)"
    >
        <ng-template ard-optgroup-tmp let-group let-total="totalChildren" let-selected="selectedChildren">
            <span class="ard-optgroup-label">
                {{ group.label }}
                <span class="count-display">{{selected}} / {{total}}</span>
            </span>
        </ng-template>
    </ard-select>
</div>
<span class="title">Object options, customized with templates</span>
<div class="grid master">
    <ard-select
        *ngFor="let disabled of [false, true]"
        [disabled]="disabled"
        [items]="colors"
        searchable
        clearable="false"
        labelFrom="name"
        valueFrom="hex"
        (focus)="log('focus', $event)"
        (blur)="log('blur', $event)"
        (add)="log('add', $event)"
        (remove)="log('remove', $event)"
        (valueChange)="log('valueChange', $event)"
        (clear)="log('clear', $event)"
        (open)="log('open', $event)"
        (close)="log('close', $event)"
        (scroll)="log('scroll', $event)"
        (scrollToEnd)="log('scrollToEnd', $event)"
        (search)="log('search', $event)"
    >
        <ng-template ard-option-tmp ard-value-tmp let-option>
            <div class="option-wrapper">
                <div class="color-display" [style]="'background: ' + option.value"></div>
                <span>{{ option.label }}</span>
            </div>
        </ng-template>
    </ard-select>
</div>
