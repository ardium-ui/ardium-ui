<div class="master">
  <span class="title">Basic color display</span>
  <div>
    <ard-color-display color="red"></ard-color-display>
  </div>
</div>
<div class="master">
  <span class="title">Color display with visual label</span>
  <div>
    <ard-color-display
      color="#80a906"
      withLabel
    ></ard-color-display>
  </div>
</div>
<div class="master">
  <span class="title">Color display with aria-label</span>
  <div>
    <ard-color-display
      color="#80a906"
      ariaLabel="Green-ish color"
    ></ard-color-display>
  </div>
</div>
<div class="master">
  <span class="title">Color display appearance</span>
  <div>
    <ard-color-display
      color="#80a906"
      appearance="circle with-border"
    ></ard-color-display>
  </div>
</div>
<div class="master">
  <span class="title">Animated color display</span>
  <div>
    <ard-color-display
      [color]="color$ | async"
      ariaLabel="Animated rainbow color display"
      noLabel
    ></ard-color-display>
  </div>
</div>
<div class="master">
  <span class="title">Rainbow table</span>
  <div class="grid">
    @for (appearance of appearances; track appearance) {
    <ard-color-display
      color="red"
      [appearance]="appearance"
    ></ard-color-display>
    }
  </div>
</div>
