<div class="flex horiz main-container">
  <div class="master">
    <span class="title">Most basic date input</span>
    <ard-date-input (valueChange)="log('valueChange', $event)" />
  </div>
</div>
<div class="flex horiz main-container">
  <div class="master">
    <span class="title">Date input with reactive forms</span>
    <ard-date-input [formControl]="formControl" />
  </div>
</div>
<div class="flex horiz main-container">
  <div class="master">
    <span class="title">Date input with starting view as year selector</span>
    <ard-date-input startView="years" />
  </div>
</div>
<div class="flex horiz main-container">
  <div class="master">
    <span class="title">Date input that remembers its last selected year</span>
    <ard-date-input startView="years" />
  </div>
</div>
