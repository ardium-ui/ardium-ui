<button
  type="button"
  role="checkbox"
  [ariaChecked]="value()"
  class="ard-slide-toggle"
  [class.ard-slide-toggle-selected]="value()"
  [ngClass]="ngClasses()"
  [tabindex]="tabIndex()"
  (click)="toggleSelected()"
  (focus)="onFocus($event)"
  (blur)="onBlur($event)"
>
  <div class="ard-hitbox"></div>
  <div class="ard-slide-toggle-track">
    <div class="ard-slide-toggle-track-overlay"></div>
  </div>
  <div class="ard-slide-toggle-handle">
    <div class="ard-focus-overlay"></div>
    @if (selectedIcon() ?? icon()) {
      <div class="ard-slide-toggle-icon ard-icon-for-selected">{{ selectedIcon() ?? icon() }}</div>
    }
    @if (unselectedIcon() ?? icon()) {
      <div class="ard-slide-toggle-icon ard-icon-for-unselected">{{ unselectedIcon() ?? icon() }}</div>
    }
  </div>
</button>
