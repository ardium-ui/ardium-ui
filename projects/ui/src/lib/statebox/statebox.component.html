<button
  #focusableElement
  type="button"
  class="ard-statebox"
  [ngClass]="ngClasses()"
  [tabindex]="tabIndex()"
  (click)="onClick()"
  (focus)="onFocus($event)"
  (blur)="onBlur($event)"
  [style]="ngStyle()"
>
  <div class="ard-hitbox"></div>
  <div class="ard-focus-overlay"></div>
  @if (internalState().keepFrame) {
  <div class="ard-statebox-frame"></div>
  }
  <div [class]="internalState().displayAsIcon ? 'ard-statebox-icon' : 'ard-statebox-character'">
    {{ internalState().display }}
  </div>
</button>
