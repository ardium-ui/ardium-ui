<button
  #focusableElement
  type="button"
  class="ard-star-button"
  role="checkbox"
  [attr.aria-checked]="selectedAccountingForReverse()"
  [attr.aria-disabled]="disabled()"
  [attr.aria-readonly]="readonly()"
  [attr.id]="htmlId()"
  [attr.name]="htmlName()"
  [ngClass]="ngClasses()"
  (click)="onClick()"
  (focus)="onFocus($event)"
  (blur)="onBlur($event)"
  [tabindex]="readonly() ? -1 : tabIndex()"
>
  <div class="ard-hitbox"></div>
  <div class="ard-focus-overlay"></div>

  <ng-template
    #defaultStarTemplate
    let-fillMode="fillMode"
    let-color="color"
  >
    <ard-star
      [filled]="fillMode"
      [color]="color"
    />
  </ng-template>

  <ng-template
    [ngTemplateOutlet]="starTemplate()?.template || defaultStarTemplate"
    [ngTemplateOutletContext]="starTemplateContext()"
  />
</button>
