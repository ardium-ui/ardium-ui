<button #focusableElement
    class="ard-star-button"
    [ngClass]="ngClasses"
    [class]="wrapperClasses"
    (click)="onClick()"
    (focus)="onFocus($event)"
    (blur)="onBlur($event)"
    [tabindex]="tabIndex"
>
    <div class="ard-hitbox"></div>
    <div class="ard-focus-overlay"></div>
    <ard-star [fill]="starFillState" [color]="color"></ard-star>
</button>
