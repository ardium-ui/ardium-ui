<button
  #focusableElement
  type="button"
  class="ard-star-button"
  [ngClass]="ngClasses()"
  (click)="onClick()"
  (focus)="onFocus($event)"
  (blur)="onBlur($event)"
  [tabindex]="tabIndex()"
>
  <div class="ard-hitbox"></div>
  <div class="ard-focus-overlay"></div>
  <ard-star
    [filled]="starFillState()"
    [color]="color()"
  ></ard-star>
</button>
