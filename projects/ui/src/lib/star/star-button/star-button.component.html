<button
  #focusableElement
  type="button"
  class="ard-star-button"
  [ngClass]="ngClasses()"
  (click)="onClick()"
  (focus)="onFocus($event)"
  (blur)="onBlur($event)"
  [tabindex]="tabIndex()"
>
  <div class="ard-hitbox"></div>
  <div class="ard-focus-overlay"></div>

  <ng-template
    #defaultStarTemplate
    let-fillMode="fillMode"
    let-color="color"
  >
    <ard-star
      [filled]="fillMode"
      [color]="color"
    />
  </ng-template>

  <ng-template
    [ngTemplateOutlet]="starTemplate()?.template || defaultStarTemplate"
    [ngTemplateOutletContext]="starTemplateContext()"
  />
</button>
