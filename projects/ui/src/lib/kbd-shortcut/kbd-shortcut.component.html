<div class="ard-kbd-shortcut" [ngClass]="ngClasses">
    <ng-container *ngFor="let key of keys ?? contentWrapper.innerText.split(splitRegex); let i = index;">
        <span *ngIf="i != 0">+</span>
        <ard-kbd [appearance]="appearance" [full]="full" [key]="key"></ard-kbd>
    </ng-container>
</div>

<div #contentWrapper class="ard-kbd-shortcut-content-wrapper">
    <ng-content></ng-content>
</div>
