<button
  #buttonElement
  ard-button
  (focus)="focusEvent.emit($event)"
  (blur)="blurEvent.emit($event)"
  [type]="type()"
  [appearance]="appearance()"
  [color]="color()"
  [disabled]="disabled()"
  [compact]="compact()"
  [lightColoring]="lightColoring()"
  [pointerEventsWhenDisabled]="pointerEventsWhenDisabled()"
  [variant]="variant()"
  [vertical]="vertical()"
  [attr.aria-label]="ariaLabel()"
>
  <ng-content></ng-content>
</button>
