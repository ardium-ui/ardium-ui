<button
  class="ard-icon-button"
  [type]="type()"
  [ngClass]="ngClasses()"
  [tabindex]="tabIndex()"
  (focus)="focusEvent.emit($event)"
  (blur)="blurEvent.emit($event)"
>
  <div class="ard-focus-overlay"></div>
  <div class="ard-button-content">
    <ng-content></ng-content>
  </div>
</button>
