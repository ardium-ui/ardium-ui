<div class="ard-pagination">
    <div class="ard-pagination__items-per-page">
        <div class="ard-pagination__text">{{ itemsPerPageText }}</div>
        <ard-select
            [items]="options"
            [compact]="compact"
            [value]="itemsPerPage"
            autoHighlightFirst="false"
            (valueChange)="onItemsPerPageChange($event[0])"
        />
    </div>
    <div class="ard-pagination__current-page">
        <div class="ard-pagination__text">
            {{ currentItemsFormatFn(getCurrentItemsContext()) }}
        </div>
        <div class="ard-pagination__buttons">
            <ard-icon-button
                *ngIf="useFirstLastButtons"
                [color]="color"
                [compact]="compact"
                [disabled]="firstPageDisabled"
                (click)="onFirstPage()"
            >
                <ard-icon>first page</ard-icon>
            </ard-icon-button>
            <ard-icon-button
                [color]="color"
                [compact]="compact"
                [disabled]="firstPageDisabled"
                (click)="onPrevPage()"
            >
                <ard-icon>navigate before</ard-icon>
            </ard-icon-button>
            <ard-icon-button
                [color]="color"
                [compact]="compact"
                [disabled]="lastPageDisabled"
                (click)="onNextPage()"
            >
                <ard-icon>navigate next</ard-icon>
            </ard-icon-button>
            <ard-icon-button
                *ngIf="useFirstLastButtons"
                [color]="color"
                [compact]="compact"
                [disabled]="lastPageDisabled"
                (click)="onLastPage()"
            >
                <ard-icon>last page</ard-icon>
            </ard-icon-button>
        </div>
    </div>
</div>
