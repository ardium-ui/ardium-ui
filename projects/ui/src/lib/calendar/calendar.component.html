<div
  class="ard-calendar"
  [ngClass]="ngClasses()"
>
  @switch (activeView()) { @case ('days') {
  <ard-days-view
    [tabIndex]="tabIndex()"
    [readOnly]="readonly()"
    [disabled]="disabled()"
    [_isUsingKeyboard]="_isUsingKeyboard()"
    [(activeMonth)]="activeMonth"
    [(activeYear)]="activeYear"
    [(selectedDate)]="selected"
    [firstWeekday]="firstWeekday()"
    [daysViewHeaderTemplate]="daysViewHeaderTemplate()"
    [floatingMonthTemplate]="floatingMonthTemplate()"
    [weekdayTemplate]="weekdayTemplate()"
    [dayTemplate]="dayTemplate()"
    (focus)="onFocus($event)"
    (blur)="onBlur($event)"
    (triggerOpenMonthsView)="onTriggerOpenMonthsView()"
    (triggerOpenYearsView)="onTriggerOpenYearsView()"
  />
  } @case ('months') {} @case ('years') {
  <ard-years-view
    [tabIndex]="tabIndex()"
    [readOnly]="readonly()"
    [disabled]="disabled()"
    [_isUsingKeyboard]="_isUsingKeyboard()"
    [(activeYear)]="activeYear"
    [(selectedDate)]="selected"
    [yearsViewHeaderTemplate]="yearsViewHeaderTemplate()"
    [yearTemplate]="yearTemplate()"
    (focus)="onFocus($event)"
    (blur)="onBlur($event)"
    (triggerOpenDaysView)="onTriggerOpenDaysView()"
    (triggerOpenMonthsView)="onTriggerOpenMonthsView()"
  />
  } }
</div>
