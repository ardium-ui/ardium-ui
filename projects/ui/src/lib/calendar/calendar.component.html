<div
  class="ard-calendar"
  [ngClass]="ngClasses()"
>
  @switch (activeView()) {
    @case ('days') {
      <ard-days-view
        [tabIndex]="tabIndex()"
        [readOnly]="readonly()"
        [disabled]="disabled()"
        [autoFocus]="autoFocus()"
        [_isUsingKeyboard]="_isUsingKeyboard()"
        [activeMonth]="activeMonth()"
        [activeYear]="activeYear()"
        [selectedDate]="selectedDate()"
        [firstWeekday]="firstWeekday()"
        [highlightedDay]="highlightedDay()"
        [min]="min()"
        [max]="max()"
        [isDayFilteredOut]="isDayFilteredOut()"
        [daysViewHeaderTemplate]="daysViewHeaderTemplate()"
        [floatingMonthTemplate]="floatingMonthTemplate()"
        [weekdayTemplate]="weekdayTemplate()"
        [dayTemplate]="dayTemplate()"
        (focus)="onFocus($event)"
        (blur)="onBlur($event)"
        (triggerOpenMonthsView)="onTriggerOpenMonthsView()"
        (triggerOpenYearsView)="onTriggerOpenYearsView()"
        (triggerChangeMonth)="changeMonth($event)"
        (triggerChangeYear)="changeYear($event)"
        (triggerHighlightDay)="setHighlightedDay($event)"
        (triggerHighlightFirstDay)="highlightFirstDay()"
        (triggerHighlightLastDay)="highlightLastDay()"
        (triggerHighlightNextDay)="highlightNextDay($event)"
        (triggerHighlightPreviousDay)="highlightPreviousDay($event)"
        (triggerHighlightSameDayNextPage)="$event ? highlightSameDayNextYear() : highlightSameDayNextMonth()"
        (triggerHighlightSameDayPreviousPage)="$event ? highlightSameDayPreviousYear() : highlightSameDayPreviousMonth()"
        (triggerSelectDay)="selectDay($event)"
      />
    }
    @case ('months') {
      <ard-months-view
        [tabIndex]="tabIndex()"
        [readOnly]="readonly()"
        [disabled]="disabled()"
        [autoFocus]="autoFocus()"
        [_isUsingKeyboard]="_isUsingKeyboard()"
        [color]="color()"
        [activeMonth]="activeMonth()"
        [activeYear]="activeYear()"
        [selectedDate]="selectedDate()"
        [min]="min()"
        [max]="max()"
        [highlightedMonth]="highlightedMonth()"
        [monthsViewHeaderTemplate]="monthsViewHeaderTemplate()"
        [monthTemplate]="monthTemplate()"
        (focus)="onFocus($event)"
        (blur)="onBlur($event)"
        (triggerOpenDaysView)="onTriggerOpenDaysView()"
        (triggerOpenYearsView)="onTriggerOpenYearsView()"
        (triggeChangeYear)="changeYear($event)"
        (triggerSelectMonth)="selectMonth($event)"
        (triggerHighlightMonth)="setHighlightedMonth($event)"
        (triggerHighlightFirstMonth)="highlightFirstMonth()"
        (triggerHighlightLastMonth)="highlightLastMonth()"
        (triggerHighlightNextMonth)="highlightNextMonth($event)"
        (triggerHighlightPreviousMonth)="highlightPreviousMonth($event)"
        (triggerHighlightSameMonthNextPage)="highlightSameMonthNextYear($event)"
        (triggerHighlightSameMonthPreviousPage)="highlightSameMonthPreviousYear($event)"
      />
    }
    @case ('years') {
      <ard-years-view
        [tabIndex]="tabIndex()"
        [readOnly]="readonly()"
        [disabled]="disabled()"
        [autoFocus]="autoFocus()"
        [_isUsingKeyboard]="_isUsingKeyboard()"
        [highlightedYear]="highlightedYear()"
        [currentYearRangeStart]="currentYearRangeStart()"
        [activeYear]="activeYear()"
        [selectedDate]="selectedDate()"
        [min]="min()"
        [max]="max()"
        [yearsViewHeaderTemplate]="yearsViewHeaderTemplate()"
        [yearTemplate]="yearTemplate()"
        (focus)="onFocus($event)"
        (blur)="onBlur($event)"
        (triggerOpenDaysView)="onTriggerOpenDaysView()"
        (triggerOpenMonthsView)="onTriggerOpenMonthsView()"
        (triggerSelectYear)="selectYear($event)"
        (triggerChangeYearsViewPage)="changeYearsViewPage($event)"
        (triggerHighlightYear)="setHighlightedYear($event)"
        (triggerHighlightFirstYear)="highlightFirstYear()"
        (triggerHighlightLastYear)="highlightLastYear()"
        (triggerHighlightNextYear)="highlightNextYear($event)"
        (triggerHighlightPreviousYear)="highlightPreviousYear($event)"
        (triggerHighlightSameYearNextPage)="highlightSameYearNextPage($event)"
        (triggerHighlightSameYearPreviousPage)="highlightSameYearPreviousPage($event)"
      />
    }
  }
</div>
