<table class="ard-table" [ngClass]="ngClasses">
    <thead class="ard-table__header">
        <tr class="ard-table__header-row" *ngFor="let row of headerCells">
            <th
                *ngFor="let cell of row"
                class="ard-table__header-cell"
                [ngClass]="cell.cell.cellClass"
                [class.ard-table__checkbox-cell]="isHeaderCellCheckbox(cell)"
                [attr.colspan]="cell.colspan"
                [attr.rowspan]="cell.rowspan"
                [scope]="cell.colspan > 1 ? 'colgroup' : 'col'"
            >
                <div
                    class="ard-table__cell-container"
                    [style.width]="cell.width"
                    [style.minWidth]="cell.minWidth"
                >
                    <ng-container *ngIf="isHeaderCellCheckbox(cell)">
                        <ng-template #defaultHeaderCheckboxTemplate let-state let-onChange="onChange">
                            <ard-checkbox [state]="state" [color]="getHeaderCheckboxColor()" unselectedColor="currentColor" (change)="onChange()" />
                        </ng-template>
                    
                        <ng-template
                            [ngTemplateOutlet]="headerCheckboxTemplate ?? defaultHeaderCheckboxTemplate"
                            [ngTemplateOutletContext]="getHeaderCheckboxContext()"
                        />
                    </ng-container>
                    <ng-container *ngIf="!isHeaderCellCheckbox(cell)">
                        <ng-template #defaultHeaderCellTemplate let-content>
                            {{ content }}
                        </ng-template>
                    
                        <ng-template 
                            [ngTemplateOutlet]="getHeaderTemplate(cell.cell.header) ?? defaultHeaderCellTemplate"
                            [ngTemplateOutletContext]="{ $implicit: cell.cell.header }"
                        />
                    </ng-container>
                </div>
            </th>
        </tr>
    </thead>
    <tbody class="ard-table__body">
        <tr
            *ngFor="let row of dataRows; let rowIndex = index;"
            class="ard-table__body-row"
            [class.ard-table__selected-row]="row.selected"
            [class.ard-table__highlighted-row]="row.highlighted"
            (click)="onRowClick(rowIndex, $event)"
            (mouseover)="onRowMouseOver($event)"
            (mouseenter)="onRowMouseEnter(rowIndex, $event)"
            (mouseleave)="onRowMouseLeave(rowIndex, $event)"
        >
            <ng-container *ngFor="let cell of row.data; let cellIndex = index">
                <ng-template #cellTmp>
                    <div
                        class="ard-table__cell-container"
                        [style]="getCellStyle(row.dataColumns[cellIndex])"
                    >
                        <ng-container *ngIf="isCellCheckbox(cell)">
                            <ng-template #defaultCheckboxTemplate let-isChecked let-onChange="onChange">
                                <ard-checkbox [selected]="isChecked" [color]="color" (change)="onChange($event)" />
                            </ng-template>

                            <ng-template
                                [ngTemplateOutlet]="checkboxTemplate ?? defaultCheckboxTemplate"
                                [ngTemplateOutletContext]="getCheckboxContext(rowIndex)"
                            />
                        </ng-container>
                        <ng-container *ngIf="!isCellCheckbox(cell)">
                            <ng-template #defaultCellTemplate let-content>
                                {{ content }}
                            </ng-template>

                            <ng-template
                                [ngTemplateOutlet]="getCellTemplate(row.dataColumns[cellIndex].template) ?? defaultCellTemplate"
                                [ngTemplateOutletContext]="{ $implicit: cell }"
                            />
                        </ng-container>
                    </div>
                </ng-template>
                <td
                    *ngIf="!row.dataColumns[cellIndex].isRowHeader"
                    class="ard-table__body-cell"
                    [ngClass]="row.dataColumns[cellIndex].cellClass"
                    [class.ard-table__checkbox-cell]="isCellCheckbox(cell)"
                >
                    <ng-template [ngTemplateOutlet]="cellTmp"></ng-template>
                </td>
                <th
                    *ngIf="row.dataColumns[cellIndex].isRowHeader"
                    class="ard-table__body-cell ard-table__row-header"
                    scope="row"
                    [ngClass]="row.dataColumns[cellIndex].cellClass"
                    [class.ard-table__checkbox-cell]="isCellCheckbox(cell)"
                >
                    <ng-template [ngTemplateOutlet]="cellTmp"></ng-template>
                </th>
            </ng-container>
        </tr>
    </tbody>
</table>
