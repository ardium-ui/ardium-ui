<div class="ard-color-picker" [ngClass]="ngClasses">
    <div class="ard-color-picker-click-areas"
        [style]="{
            '--ard-color-picker-current-hue': currentShadeMapColor,
            '--ard-color-picker-current-color': currentOpacityMapColor
        }"
    >
        <div #shadeMap
            class="ard-color-picker-shade-map"
            (mousedown)="onShadeAreaMouseDown($event)"
            (pointerdown)="onShadeAreaMouseDown($event)"
        >
            <div class="ard-color-picker-shade-indicator-container" [style]="getShadeIndicatorPosition()">
                <ng-template #defaultShadeIndicatorTemplate>
                    <div class="ard-color-picker-shade-indicator"></div>
                </ng-template>
                
                <ng-template [ngTemplateOutlet]="shadeIndicatorTemplate || defaultShadeIndicatorTemplate"
                    [ngTemplateOutletContext]="getIndicatorContext()"
                ></ng-template>
            </div>
        </div>
        <div #hueMap
            class="ard-color-picker-hue-map"
            (mousedown)="onHueAreaMouseDown($event)"
            (pointerdown)="onHueAreaMouseDown($event)"
        >
            <div class="ard-color-picker-hue-indicator-container" [style]="getHueIndicatorPosition()">
                <ng-template #defaultHueIndicatorTemplate>
                    <div class="ard-color-picker-hue-indicator"></div>
                </ng-template>
                
                <ng-template [ngTemplateOutlet]="hueIndicatorTemplate || defaultHueIndicatorTemplate"
                    [ngTemplateOutletContext]="getIndicatorContext()"
                ></ng-template>
            </div>
        </div>
        <div #opacityMap
            *ngIf="withOpacity"
            class="ard-color-picker-opacity-map"
            (mousedown)="onOpacityAreaMouseDown($event)"
            (pointerdown)="onOpacityAreaMouseDown($event)"
        >
            <div class="ard-color-picker-opacity-indicator-container" [style]="getOpacityIndicatorPosition()">
                <ng-template #defaultOpacityIndicatorTemplate>
                    <div class="ard-color-picker-opacity-indicator"></div>
                </ng-template>
                
                <ng-template [ngTemplateOutlet]="opacityIndicatorTemplate || defaultOpacityIndicatorTemplate"
                    [ngTemplateOutletContext]="getIndicatorContext()"
                ></ng-template>
            </div>
        </div>
    </div>
    <div class="ard-color-picker-input-panel">
        <div class="ard-color-picker-inputs">
            <div class="ard-color-picker-input-type">
                <ard-select compact appearance="transparent" value="['HEX']">
                    <ard-option>HEX</ard-option>
                    <ard-option>RGB</ard-option>
                    <ard-option>HSL</ard-option>
                    <ard-option>HSV</ard-option>
                </ard-select>
            </div>
        </div>
        <div class="ard-color-picker-window-container">
            <ng-template #defaultColorWindowTemplate let-col let-refcol="referenceColor">
                <div class="ard-color-picker-window">
                    <div class="ard-color-picker-window-current" [style]="{ background: col.hex() }"></div>
                    <div class="ard-color-picker-window-reference" [style]="{ background: refcol.hex() }"></div>
                </div>
            </ng-template>
        
            <ng-template [ngTemplateOutlet]="colorWindowTemplate || defaultColorWindowTemplate"
                [ngTemplateOutletContext]="getColorWindowContext()"
            ></ng-template>
        </div>
    </div>
</div>

<ng-template #hexInput>

</ng-template>
