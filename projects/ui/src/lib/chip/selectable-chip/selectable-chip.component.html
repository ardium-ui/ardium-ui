<button
  type="button"
  class="ard-chip-wrapper ard-chip-selectable"
  role="checkbox"
  [attr.aria-checked]="selectedAccountingForReverse()"
  [class.ard-chip-selected]="selectedAccountingForReverse()"
  [attr.id]="htmlId()"
  [attr.name]="htmlName()"
  [attr.aria-disabled]="disabled()"
  [ngClass]="ngClasses()"
  [title]="chipTitle()"
  [tabindex]="tabIndex()"
  (click)="toggleSelected()"
  (focus)="onFocus($event)"
  (blur)="onBlur($event)"
>
  <div class="ard-focus-overlay"></div>
  <div
    class="ard-chip-selection-icon"
    role="img"
  ></div>
  <div class="ard-chip-content-wrapper">
    <ng-content></ng-content>
  </div>
</button>
