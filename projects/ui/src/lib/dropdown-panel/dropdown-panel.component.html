<div
  class="ard-dropdown-panel-container"
  [ngClass]="ngClasses()"
>
  @if (headerTemplate()) {
    <div class="ard-dropdown-header">
      <ng-template
        [ngTemplateOutlet]="headerTemplate()"
        [ngTemplateOutletContext]="{ searchTerm: filterValue() }"
      >
      </ng-template>
    </div>
  }
  <div
    #scroll
    class="ard-dropdown-panel-content"
    [attr.id]="panelId()"
    (scroll)="onScroll()"
  >
    <ng-content></ng-content>
  </div>
  @if (footerTemplate()) {
    <div class="ard-dropdown-footer">
      <ng-template
        [ngTemplateOutlet]="footerTemplate()"
        [ngTemplateOutletContext]="{ searchTerm: filterValue() }"
      >
      </ng-template>
    </div>
  }
</div>
