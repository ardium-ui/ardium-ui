<button
  class="ard-checkbox"
  role="checkbox"
  type="button"
  [id]="htmlId()"
  [ariaChecked]="selectedAccountingForReverse()"
  [tabindex]="tabIndex()"
  [ngClass]="ngClasses()"
  (click)="toggleState()"
  (focus)="onFocus($event)"
  (blur)="onBlur($event)"
>
  <div class="ard-hitbox"></div>
  <div class="ard-focus-overlay"></div>

  <ng-template
    #defaultCheckboxTemplate
    let-state="state"
    let-selected="selected"
  >
    <ard-icon
      [icon]="
        state === State.Selected
          ? 'check_box'
          : state === State.Unselected
          ? 'check_box_outline_blank'
          : 'indeterminate_check_box'
      "
      [filled]="state !== State.Indeterminate"
    />
  </ng-template>

  <ng-template
    [ngTemplateOutlet]="templateRepository()?.checkboxTmp()?.template ?? checkboxTemplate()?.template ?? defaultCheckboxTemplate"
    [ngTemplateOutletContext]="checkboxTemplateContext()"
  />
</button>
