<div class="ard-slider-container-master"
    [ngClass]="ngClasses"
    [class.ard-slider-handle-grabbed]="isSliderHandleGrabbed"
>
    <div class="ard-slider-container">
        <div #track
            class="ard-slider-track"
            (pointerdown)="onTrackHitboxPointerDown($event)"
        >
            <div class="ard-hitbox"></div>
            <div class="ard-slider-track-overlay ard-slider-track-inactive"></div>
            <div class="ard-slider-track-overlay ard-slider-track-active" [style]="{width: getHandlePosition(1)}"></div>
            <div class="ard-value-tick-container" *ngIf="showValueTicks">
                <div class="ard-value-tick" *ngFor="let left of tickArray" [style]="{left: left}"></div>
            </div>
        </div>
        <button #focusableElement
            class="ard-slider-handle"
            [tabindex]="tabIndex"
            [class.ard-grabbed]="isSliderHandleGrabbed"
            (pointerdown)="onPointerDownOnHandle($event)"
            (focus)="onFocus($event)"
            (blur)="onBlur($event)"
            [style]="{left: getHandlePosition(1)}"
        >
            <div class="ard-focus-overlay"></div>
            <div class="ard-hitbox"></div>
        </button>
    </div>
    <div class="ard-slider-label-container" *ngIf="labelsForTemplate.length">
        <div
            *ngFor="let label of labelsForTemplate"
            class="ard-slider-label"
            [style]="{left: label.positionPercent}"
        >{{ label.label }}</div>
    </div>
</div>
