<div class="ard-form-field-frame" [ngClass]="ngClasses">
    <div class="ard-form-field-overlay"></div>
    <div class="ard-form-field-prefix-container" *ngIf="prefixTemplateInput ?? prefixTemplate">
        <ng-template [ngTemplateOutlet]="prefixTemplateInput ?? prefixTemplate"></ng-template>
    </div>
    <div class="ard-form-field-content-container">
        <ng-content></ng-content>
    </div>
    <div class="ard-form-field-suffix-container" *ngIf="suffixTemplateInput ?? suffixTemplate">
        <ng-template [ngTemplateOutlet]="suffixTemplateInput ?? suffixTemplate"></ng-template>
    </div>
</div>
