<div class="ard-digit-input">
    <div class="ard-digit-input__item" *ngFor="let data of configArrayData">
        <input
            #input
            #focusableElement
            *ngIf="data.type == 'input'"
            class="ard-digit-input__input"
            type="text"
            autocomplete="off"
            (input)="onInput($event, data.index!)"
            (focus)="onFocusMaster($event, data.index!)"
            (blur)="onBlurMaster($event, data.index!)"
        />
        <div
            *ngIf="data.type == 'static'"
            class="ard-digit-input__static"
        >
            {{ data.char }}
        </div>
    </div>
</div>
