<ard-form-field-frame
  [appearance]="appearance"
  [variant]="variant"
  [compact]="compact"
  [isFocused]="isFocused"
  [prefixTemplate]="prefixTemplate"
  [suffixTemplate]="suffixTemplate"
  #overlayHost
>
  <div
    class="ard-color-input"
    [class.ard-has-value]="value"
    (mouseup)="onMouseup()"
  >
    <div class="ard-input-container">
      @if (shouldDisplayPlaceholder) {
        <ng-template #defaultPlaceholderTemplate>
          <div class="ard-placeholder">{{ placeholder }}</div>
        </ng-template>

        <ng-template [ngTemplateOutlet]="placeholderTemplate || defaultPlaceholderTemplate"></ng-template>
      }

      <input
        #textInput
        [attr.id]="inputId"
        tabindex="-1"
        readonly
      />
    </div>

    <ard-_clear-button
      *ngIf="shouldShowClearButton"
      [title]="clearButtonTitle"
      (mouseup)="onClearButtonClick($event)"
    ></ard-_clear-button>

    <button
      class="ard-color-display-button"
      #focusableElement
      (focus)="onFocus($event)"
      (blur)="onBlur($event)"
      (copy)="onCopy($event)"
    >
      <ard-color-display [color]="value"></ard-color-display>
    </button>
  </div>
</ard-form-field-frame>

<ng-template #overlayTemplate>
  <ard-card
    class="ard-overlay-card ard-color-input-overlay-card"
    [appearance]="overlayAppearance"
    [variant]="overlayVariant"
    (ardClickOutside)="handleOutsideClick($event)"
  >
    <ard-color-picker
      [value]="value"
      (valueChange)="onColorPickerChange($event)"
      [hueIndicatorTemplate]="hueIndicatorTemplate"
      [shadeIndicatorTemplate]="shadeIndicatorTemplate"
      [opacityIndicatorTemplate]="opacityIndicatorTemplate"
      [colorReferenceTemplate]="colorReferenceTemplate"
    ></ard-color-picker>
    <ard-card-action-buttons *ngIf="withActionButtons">
      <ng-template
        #defaultActionButtonsTemplate
        let-applyFn="apply"
        let-cancelFn="cancel"
      >
        <ard-button
          appearance="transparent"
          [variant]="actionButtonVariant"
          (click)="cancelFn()"
          >Cancel</ard-button
        >
        <ard-button
          appearance="raised-strong"
          [variant]="actionButtonVariant"
          (click)="applyFn()"
          >Apply</ard-button
        >
      </ng-template>

      <ng-template
        [ngTemplateOutlet]="actionButtonsTemplate ?? defaultActionButtonsTemplate"
        [ngTemplateOutletContext]="getActionButtonsContext()"
      />
    </ard-card-action-buttons>
  </ard-card>
</ng-template>
