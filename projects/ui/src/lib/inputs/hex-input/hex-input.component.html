<ard-form-field-frame
  [appearance]="appearance()"
  [variant]="variant()"
  [compact]="compact()"
  [hasError]="hasError()"
  [isSuccess]="isSuccess()"
  [isFocused]="isFocused()"
  [prefixTemplate]="prefixTemplate()?.template"
  [suffixTemplate]="suffixTemplate()?.template"
>
  <div
    class="ard-hex-input"
    [class.ard-has-value]="value"
    (mouseup)="onMouseup()"
  >
    @if (showHash()) {
      <div class="ard-hash-container">#</div>
    }
    <div class="ard-input-container">
      @if (shouldDisplayPlaceholder()) {
        <ng-template #defaultPlaceholderTemplate>
          <div class="ard-placeholder">{{ placeholder() }}</div>
        </ng-template>

        <ng-template [ngTemplateOutlet]="placeholderTemplate()?.template || defaultPlaceholderTemplate"></ng-template>
      }

      <input
        #textInput
        #focusableElement
        type="text"
        [attr.id]="inputId()"
        [attr.tabindex]="tabIndex()"
        [readonly]="readonly()"
        [disabled]="disabled()"
        (input)="onInput(textInput.value, $event)"
        (focus)="onFocus($event)"
        (blur)="onBlur($event)"
        (change)="onChange($event)"
        (mouseup)="$event.stopPropagation()"
        (copy)="onCopy($event)"
      />
    </div>

    @if (shouldShowClearButton()) {
      <ard-clear-button
        [title]="clearButtonTitle()"
        (click)="onClearButtonClick($event)"
      />
    }
  </div>
</ard-form-field-frame>
