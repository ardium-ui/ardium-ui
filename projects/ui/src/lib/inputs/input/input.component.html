<ard-form-field-frame
  [appearance]="appearance()"
  [variant]="variant()"
  [compact]="compact()"
  [isFocused]="isFocused"
  [prefixTemplate]="prefixTemplate()?.template"
  [suffixTemplate]="suffixTemplate()?.template"
>
  <div
    class="ard-input"
    #suggestionsHost
    [ngClass]="ngClasses()"
    [class.ard-has-value]="value"
    (click)="focus()"
  >
    <div class="ard-input-container">
      @if (shouldDisplayAutocomplete()) {
        <div class="ard-autocomplete">{{ autocomplete() }}</div>
      }
      @if (shouldDisplayPlaceholder()) {
        <ng-template
          #defaultPlaceholderTemplate
          let-text
        >
          <div class="ard-placeholder">{{ text }}</div>
        </ng-template>

        <ng-template [ngTemplateOutlet]="placeholderTemplate()?.template || defaultPlaceholderTemplate"></ng-template>
      }
      <input
        #textInput
        #focusableElement
        type="text"
        [attr.id]="inputId()"
        [attr.tabindex]="tabIndex()"
        [readonly]="readonly()"
        [disabled]="disabled()"
        (input)="onInput(textInput.value)"
        (focus)="onFocus($event)"
        (blur)="onBlur($event)"
        (copy)="onCopy($event)"
      />
    </div>

    @if (shouldShowClearButton()) {
      <ard-clear-button
        [title]="clearButtonTitle()"
        (click)="onClearButtonClick($event)"
      />
    }
  </div>
</ard-form-field-frame>

<ng-template #suggestionsTemplate>
  <ard-dropdown-panel
    class="ard-dropdown-panel ard-input-suggestions-panel"
    role="listbox"
    [compact]="compact"
    aria-label="Suggestions"
    [appearance]="dropdownAppearanceOrDefault()"
    [variant]="dropdownVariantOrDefault()"
    [isOpen]="shouldDisplaySuggestions()"
    (ardClickOutside)="handleSuggestionClickOutside($event)"
    (mousemove)="onMouseMove()"
  >
    @for (item of suggestionItems(); track item.index()) {
      <div
        class="ard-option"
        role="option"
        [class.ard-option-selected]="item.selected()"
        [class.ard-option-highlighted]="item.highlighted()"
        [attr.aria-selected]="item.selected()"
        (click)="selectSuggestion(item, $event)"
        (mouseenter)="onSuggestionMouseEnter(item, $event)"
        (mouseleave)="onSuggestionMouseLeave(item, $event)"
      >
        <span class="ard-option-label">
          <ng-template #defaultOptionTemplate>
            {{ item.label() }}
          </ng-template>

          <ng-template
            [ngTemplateOutlet]="suggestionTemplate()?.template || defaultOptionTemplate"
            [ngTemplateOutletContext]="getOptionContext(item)"
          ></ng-template>
        </span>
      </div>
    }
    @if (areSuggestionsLoading()) {
      <ng-template #defaultLoadingPlaceholderTemplate>
        <div class="ard-option ard-option-disabled">{{ suggestionsLoadingText() }}</div>
      </ng-template>

      <ng-template [ngTemplateOutlet]="suggestionLoadingTemplate()?.template || defaultLoadingPlaceholderTemplate"></ng-template>
    }
  </ard-dropdown-panel>
</ng-template>
