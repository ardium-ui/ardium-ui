<ard-form-field-frame
    [appearance]="appearance"
    [variant]="variant"
    [compact]="compact"
    [isFocused]="isFocused"
    [prefixTemplate]="prefixTemplate"
    [suffixTemplate]="suffixTemplate"
>
    <div class="ard-input"
        #suggestionsHost
        [ngClass]="ngClasses"
        [class.ard-has-value]="value"
        (click)="focus()"
    >
        <div class="ard-input-container">
            @if (shouldDisplayAutocomplete()) {
            <div class="ard-autocomplete">{{ autocomplete() }}</div>
            }

            <ng-container *ngIf="shouldDisplayPlaceholder">
                <ng-template #defaultPlaceholderTemplate>
                    <div class="ard-placeholder">{{ placeholder }}</div>
                </ng-template>

                <ng-template [ngTemplateOutlet]="placeholderTemplate || defaultPlaceholderTemplate"></ng-template>
            </ng-container>
            
            <input #textInput
                #focusableElement
                type="text"
                [attr.id]="inputId"
                [attr.tabindex]="tabIndex()"
                [readonly]="readonly()"
                [disabled]="disabled()"
                (input)="onInput(textInput.value)"
                (focus)="onFocus($event)"
                (blur)="onBlur($event)"
                (copy)="onCopy($event)"
            >
        </div>

        <ard-_clear-button
            *ngIf="shouldShowClearButton"
            [title]="clearButtonTitle"
            (click)="onClearButtonClick($event)"
        ></ard-_clear-button>
    </div>
</ard-form-field-frame>

<ng-template #suggestionsTemplate>
    <ard-dropdown-panel
        class="ard-dropdown-panel ard-input-suggestions-panel"
        role="listbox"
        [compact]="compact"
        aria-label="Suggestions"
        [appearance]="dropdownAppearance"
        [variant]="dropdownVariant"
        [isOpen]="shouldDisplaySuggestions()"
        (ardClickOutside)="handleSuggestionClickOutside($event)"
        (mousemove)="onMouseMove()"
    >
        @for (item of suggestionItems(); track item.index()) {
        <div
            class="ard-option"
            role="option"
            [class.ard-option-selected]="item.selected()"
            [class.ard-option-highlighted]="item.highlighted()"
            [attr.aria-selected]="item.selected()"
            (click)="selectSuggestion(item, $event)"
            (mouseenter)="onSuggestionMouseEnter(item, $event)"
            (mouseleave)="onSuggestionMouseLeave(item, $event)"
        >
            <span class="ard-option-label">
                <ng-template #defaultOptionTemplate>
                    {{item.label()}}
                </ng-template>

                <ng-template
                    [ngTemplateOutlet]="suggestionTemplate || defaultOptionTemplate"
                    [ngTemplateOutletContext]="getOptionContext(item)"
                ></ng-template>
            </span>
        </div>
        }

        @if (areSuggestionsLoading()) {
        <ng-template #defaultLoadingPlaceholderTemplate>
            <div class="ard-option ard-option-disabled">{{suggestionsLoadingText()}}</div>
        </ng-template>
    
        <ng-template [ngTemplateOutlet]="suggestionLoadingTemplate || defaultLoadingPlaceholderTemplate"></ng-template>
        }
    </ard-dropdown-panel>
</ng-template>
