<ard-form-field-frame
  [appearance]="appearance()"
  [variant]="variant()"
  [compact]="compact()"
  [readonly]="readonly()"
  [isFocused]="isFocused()"
  [hasError]="hasError()"
  [isSuccess]="isSuccess()"
  [prefixTemplate]="prefixTemplate()?.template"
  [suffixTemplate]="suffixTemplate()?.template"
>
  <div
    class="ard-password-input"
    [ngClass]="ngClasses()"
    [class.ard-has-value]="value()"
    (click)="focus()"
  >
    <div class="ard-input-container">
      @if (shouldDisplayPlaceholder()) {
        <ng-template #defaultPlaceholderTemplate>
          <div class="ard-placeholder">{{ placeholder() }}</div>
        </ng-template>

        <ng-template [ngTemplateOutlet]="placeholderTemplate()?.template || defaultPlaceholderTemplate" />
      }

      <input
        #textInput
        #focusableElement
        [type]="!revealable() || !revealed() ? 'password' : 'text'"
        [attr.id]="inputId()"
        [attr.tabindex]="tabIndex()"
        [readonly]="readonly()"
        [disabled]="disabled()"
        (input)="onInput(textInput.value)"
        (focus)="onFocus($event)"
        (blur)="onBlur($event)"
        (change)="onChange($event)"
        (copy)="onCopy($event)"
        [class.ard-revealed]="revealable() && revealed()"
      />
    </div>

    @if (revealable()) {
      <button
        class="ard-reveal-button"
        type="button"
        (click)="!holdToReveal() && toggleReveal()"
        (mousedown)="holdToReveal() && revealed.set(true)"
      >
        <ng-template
          #defaultRevealTemplate
          let-revealed
        >
          <ard-icon [icon]="revealed ? 'visibility' : 'visibility_off'"></ard-icon>
        </ng-template>

        <ng-template
          [ngTemplateOutlet]="revealTemplate()?.template || defaultRevealTemplate"
          [ngTemplateOutletContext]="revealButtonContext()"
        />
      </button>
    }
  </div>
</ard-form-field-frame>
