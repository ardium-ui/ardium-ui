<ard-form-field-frame
    [appearance]="appearance"
    [variant]="variant"
    [compact]="compact"
    [isFocused]="isFocused"
    [prefixTemplate]="prefixTemplate"
    [suffixTemplate]="suffixTemplate"
>
    <div class="ard-password-input"
        [ngClass]="ngClasses"
        [class.ard-has-value]="value"
        (click)="focus()"
    >
        <div class="ard-input-container">
            <ng-container *ngIf="shouldDisplayPlaceholder">
                <ng-template #defaultPlaceholderTemplate>
                    <div class="ard-placeholder">{{ placeholder }}</div>
                </ng-template>

                <ng-template [ngTemplateOutlet]="placeholderTemplate || defaultPlaceholderTemplate"></ng-template>
            </ng-container>
            
            <input #textInput
                #focusableElement
                [type]="!revealable || !revealed ? 'password' : 'text'"
                [attr.id]="inputId"
                [attr.tabindex]="tabIndex"
                [readonly]="readonly"
                [disabled]="disabled"
                (input)="onInput(textInput.value)"
                (focus)="onFocus($event)"
                (blur)="onBlur($event)"
                (change)="onChange($event)"
                (copy)="onCopy($event)"
                [class.ard-revealed]="revealable && revealed"
            >
        </div>

        <button *ngIf="revealable"
            class="ard-reveal-button"
            (click)="toggleReveal()"
        >
            <ng-template #defaultRevealTemplate let-revealed>
                    <ard-icon [icon]="revealed ? 'visibility' : 'visibility_off'"></ard-icon>
            </ng-template>

            <ng-template
                [ngTemplateOutlet]="revealTemplate || defaultRevealTemplate"
                [ngTemplateOutletContext]="getRevealButtonContext()"
            ></ng-template>
        </button>
    </div>
</ard-form-field-frame>
