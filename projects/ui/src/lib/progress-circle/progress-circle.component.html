<div
  class="ard-progress-circle"
  [ngClass]="ngClasses()"
>
  <div class="ard-progress-circle-background"></div>
  <div
    class="ard-progress-circle-overlay"
    [style]="fillPercentVariable()"
  ></div>
  <div class="ard-progress-circle-value">
    <ng-template
      #defaultValueTemplate
      let-percents
    >
      {{ percents | number:'1.0-0' }}%
    </ng-template>

    <ng-template
      [ngTemplateOutlet]="valueTemplate() || defaultValueTemplate"
      [ngTemplateOutletContext]="getValueContext()"
    ></ng-template>
  </div>
</div>
