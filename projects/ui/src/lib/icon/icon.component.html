<span class="ard-icon material-symbols-outlined"
    [attr.aria-hidden]="ariaLabel != undefined"
    [attr.aria-label]="ariaLabel"
    [style]="fontVariationSettings"
>
    {{ icon ?? contentWrapper.innerText | icon }}
</span>


<div #contentWrapper class="ard-icon-content-wrapper">
    <ng-content></ng-content>
</div>
